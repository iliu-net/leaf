<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A minimal, fast, offline-capable notes app">
  <meta name="theme-color" content="#0a0a0a">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.svg" sizes="any" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Leaf">

  <title>Leaf</title>

  <!-- Theme init: set data-theme before CSS loads to prevent FOUC -->
  <script>
    (function(){
      var t = localStorage.getItem('leaf:theme');
      if (!t) { t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; }
      document.documentElement.setAttribute('data-theme', t);
      var mc = document.querySelector('meta[name="theme-color"]');
      if (mc) { mc.setAttribute('content',
        t === 'light' ? '#fafaf8' : t === 'magenta' ? '#ffffff' : t === 'paired-12' ? '#0d1117' : '#080808'); }
    })();
  </script>

  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/theme-dark.css">
  <link rel="stylesheet" href="css/theme-light.css">
  <link rel="stylesheet" href="css/theme-magenta.css">
  <link rel="stylesheet" href="css/theme-paired-12.css">
  <link rel="stylesheet" href="css/hljs.css">
  <link rel="stylesheet" href="css/cm.css">
  <link rel="stylesheet" href="css/katex.css">
  <link rel="stylesheet" href="css/spreadsheet.css">
</head>
<body>

<!-- ── Login screen ── -->
<!-- Shown by default; app.js hides it after auth is confirmed -->
<div id="login-screen">
  <div id="login-card">
      <button id="login-close" class="btn-icon" title="Close (Esc)">×</button>

    <div id="login-brand">
      <div class="logo" aria-hidden="true">
        <svg width="16" height="16" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
          <path d="M9 12h6m-6 4h6m2 4H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5l5 5v11a2 2 0 0 1-2 2z"/>
        </svg>
      </div>
      <span>Leaf</span>
    </div>

    <h1 id="login-heading">Sign in</h1>

    <form id="login-form" novalidate>

      <div class="field">
        <label for="login-username">Username</label>
        <input id="login-username" type="text"
               autocomplete="username" autocapitalize="none"
               spellcheck="false" required>
      </div>

      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" type="password"
               autocomplete="current-password" required>
      </div>

      <p id="login-error" role="alert" aria-live="assertive"></p>

      <button id="login-btn" type="submit" class="btn btn-primary btn-full">
        Sign in
      </button>

    </form>

  </div>
</div>

<!-- ── App shell ── -->
<!-- Hidden until auth confirmed -->
<div id="app">

  <!-- ── Header ── -->
  <header id="header">

    <div id="header-brand">
      <button id="btn-toggle-sidebar" class="btn-icon" title="Toggle sidebar"
              aria-label="Toggle sidebar">
        <svg width="14" height="14" fill="none" stroke="currentColor"
             stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 18V6l7 6-7 6z"/>
        </svg>
      </button>
      <button id="btn-menu" class="btn-menu" title="Menu" aria-label="Menu">
        <span class="logo" aria-hidden="true">
          <svg width="13" height="13" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
            <path d="M9 12h6m-6 4h6m2 4H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5l5 5v11a2 2 0 0 1-2 2z"/>
          </svg>
        </span>
        <span class="brand-text">Leaf</span>
      </button>
      <div id="app-menu" class="dropdown-menu">
        <button id="menu-folder" class="dropdown-item" data-view="notes">
          <span class="dropdown-check">✓</span> Folder
        </button>
        <button id="menu-tags" class="dropdown-item" data-view="tags">
          <span class="dropdown-check">✓</span> Tags
        </button>
        <button id="menu-trash" class="dropdown-item" data-view="trash">
          <span class="dropdown-check">✓</span> Trash
        </button>
        <div class="dropdown-divider"></div>
        <div class="dropdown-submenu">
          <button class="dropdown-item">Theme</button>
          <div class="dropdown-sub" id="theme-menu">
            <button class="theme-option active" data-theme-val="dark">Dark</button>
            <button class="theme-option" data-theme-val="light">Light</button>
            <button class="theme-option" data-theme-val="magenta">Magenta</button>
            <button class="theme-option" data-theme-val="paired-12">Paired-12</button>
          </div>
        </div>
        <div class="dropdown-divider"></div>
        <button id="menu-reset-db" class="dropdown-item">Reset Database</button>
      </div>
    </div>

    <div id="header-center">
      <button id="btn-back" class="btn-icon" title="Back" aria-label="Back" disabled>
        <svg width="14" height="14" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 12H5m0 0 7-7m-7 7 7 7"/>
        </svg>
      </button>
      <span id="current-file">No file selected</span>
      <div id="dirty-dot" title="Changes pending save…"></div>
    </div>

    <div id="header-actions">
      <span id="username-display" class="username-display"></span>
      <button id="btn-signin" class="btn" style="display:none">Sign in</button>
      <button id="btn-save" class="btn btn-primary" title="Save now (Ctrl+S)">
        Save
      </button>
      <button id="btn-logout" class="btn" title="Sign out">
        Sign out
      </button>
    </div>

  </header>

  <!-- ── Main ── -->
  <div id="main">

    <!-- Sidebar -->
    <aside id="sidebar" aria-label="Note list">

      <div id="sidebar-toolbar">
        <div id="search-wrap">
          <svg width="13" height="13" fill="none" stroke="currentColor"
               stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search" type="search" placeholder="Filter…"
                 aria-label="Filter notes" autocomplete="off" spellcheck="false">
        </div>
        <button id="btn-new" class="btn" title="New note">
          <svg width="13" height="13" fill="none" stroke="currentColor"
               stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          New
        </button>
      </div>

      <!-- Trash mode toolbar (hidden by default) -->
      <div id="trash-toolbar" style="display:none">
        <svg class="trash-toolbar-icon" width="14" height="14" fill="none"
             stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14"/>
        </svg>
        <div id="trash-search-wrap">
          <input id="trash-search" type="search" placeholder="Filter…"
                 aria-label="Filter trash" autocomplete="off" spellcheck="false">
        </div>
      </div>

      <div id="file-list" role="list" aria-label="Notes"></div>

      <!-- System notes (pinned below user notes) -->
      <div id="system-notes-section" style="display:none">
        <div class="system-notes-divider">System</div>
        <div id="system-notes-list" role="list" aria-label="System notes"></div>
      </div>

      <!-- Shown only on first visit while initial sync is in progress -->
      <div id="sidebar-loading" aria-live="polite" aria-label="Loading notes">
        <div class="sidebar-spinner" aria-hidden="true"></div>
        <span>Syncing notes…</span>
      </div>

      <div id="sidebar-footer">
        <span id="note-count" aria-live="polite">0 notes</span>
      </div>

      <!-- Trash mode footer (hidden by default) -->
      <div id="trash-footer" style="display:none">
        <span id="trash-item-count">0 items</span>
        <button id="btn-empty-trash" class="btn-small danger">Empty trash</button>
      </div>

    </aside>

    <!-- Sidebar resizer handle -->
    <div id="sidebar-resizer" aria-hidden="true"></div>

    <!-- Editor -->
    <main id="editor-wrap">

      <!-- Trash preview banner (hidden by default) -->
      <div id="trash-banner" style="display:none">
        <div class="trash-banner-bar">
          <span class="trash-banner-icon">⚠</span>
          <span id="trash-banner-title"></span>
          <button id="trash-banner-restore" class="btn-small">Restore</button>
          <button id="trash-banner-purge" class="btn-small danger">Delete forever</button>
        </div>
        <div id="trash-banner-body"></div>
      </div>

      <div id="empty-state" aria-label="No note selected">
        <div class="empty-icon" aria-hidden="true">
          <svg width="22" height="22" fill="none" stroke="currentColor"
               stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M9 12h6m-6 4h6m2 4H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5l5 5v11a2 2 0 0 1-2 2z"/>
          </svg>
        </div>
        <p>Select a note or create a new one</p>
        <small><kbd>Ctrl S</kbd> save</small>
      </div>

      <!-- Tab bar (hidden when no note is open) -->
      <div id="editor-tabs" style="display:none" role="tablist" aria-label="Editor tabs">
        <button id="tab-btn-view" class="tab-btn active" role="tab" aria-selected="true">View</button>
        <button id="tab-btn-code" class="tab-btn"        role="tab" aria-selected="false" style="display:none">Code</button>
        <button id="tab-btn-raw"  class="tab-btn"        role="tab" aria-selected="false">Raw</button>
        <button id="tab-btn-meta" class="tab-btn"        role="tab" aria-selected="false">Meta</button>
      </div>

      <!-- Code tab — CodeMirror editor (hidden until CM chunk loads successfully) -->
      <div id="tab-code" class="tab-panel" role="tabpanel">
        <input id="code-title" type="text" placeholder="Untitled"
               class="code-title-input" spellcheck="false"
               aria-label="Note title" />
      </div>

      <!-- Raw tab — the textarea -->
      <div id="tab-raw" class="tab-panel" role="tabpanel">
        <textarea
          id="note-area"
          spellcheck="true"
          placeholder="Start writing…"
          aria-label="Note content"
        ></textarea>
      </div>

      <!-- View tab — rendered markdown view -->
      <div id="tab-view" class="tab-panel active" role="tabpanel">
        <div class="view-header"></div>
        <div class="view-content"></div>
      </div>

      <!-- Meta tab — structured metadata view -->
      <div id="tab-meta" class="tab-panel" role="tabpanel">
        <div id="meta-panel">
          <!-- Title -->
          <div class="meta-field">
            <label for="meta-title">Title</label>
            <input id="meta-title" type="text" placeholder="Note title" class="meta-input" />
          </div>

          <!-- Summary -->
          <div class="meta-field">
            <label for="meta-summary">Summary</label>
            <textarea id="meta-summary" placeholder="Short description" class="meta-textarea" rows="3"></textarea>
          </div>

          <!-- Tags -->
          <div class="meta-field">
            <label for="meta-tags">Tags</label>
            <input id="meta-tags" type="text" placeholder="tag1, tag2, tag3" class="meta-input" />
          </div>

          <!-- Custom fields -->
          <div id="meta-custom-section">
            <div class="meta-section-header">
              <span>Custom Fields</span>
              <button id="btn-add-custom" class="btn-small">+ Add</button>
              <button id="btn-add-lang" class="btn-small">+ Language</button>
            </div>
            <div id="meta-custom-rows"></div>
          </div>

          <!-- Datalists for meta-tab inputs -->
          <!-- lang-list is populated dynamically from SpaConfig.spellcheck.preferred_langs -->
          <datalist id="lang-list"></datalist>
          <!-- known-keys: common frontmatter keys, inspired by Word document properties -->
          <datalist id="known-keys">
            <option value="category">category</option>
            <option value="comments">comments</option>
            <option value="company">company</option>
            <option value="manager">manager</option>
            <option value="status">status</option>
          </datalist>

          <!-- Content stats (body only) -->
          <div id="meta-stats-section">
            <div class="meta-section-header">Size (body only)</div>
            <div id="meta-stats" class="meta-stats"></div>
          </div>

          <!-- System info -->
          <div id="meta-system-section">
            <div class="meta-section-header">System Info</div>
            <table id="meta-system-table" class="meta-system-table">
              <tr><td>Version</td><td id="meta-sys-current"></td></tr>
              <tr><td>Created</td><td id="meta-sys-created"></td></tr>
              <tr><td>Updated</td><td id="meta-sys-updated"></td></tr>
              <tr><td>Edit time</td><td id="meta-sys-edit-time"></td></tr>
              <tr><td></td><td><button id="btn-view-history" class="btn-small">View History…</button></td></tr>
            </table>
          </div>
        </div>
      </div>

    </main>

  </div>

  <!-- ── Status bar ── -->
  <div id="statusbar" role="status" aria-live="polite">
    <span id="status-msg"></span>
    <span id="offline-badge" class="status-item">offline</span>
    <span id="sync-status"   class="status-item"></span>
   <button id="btn-cookmode" class="btn-cookmode status-item" title="Cookmode: OFF — click to keep screen awake"
           aria-label="Toggle cookmode" aria-pressed="false">☀</button>
  </div>

</div>

<!-- ── New note modal ── -->
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="modal">
    <h2 id="modal-title">New note</h2>
    <div class="modal-field">
      <label for="modal-input">Name</label>
      <input id="modal-input" type="text" placeholder="my-note"
             maxlength="80" autocomplete="off" spellcheck="false">
    </div>
    <p id="modal-hint" class="modal-hint"></p>
    <div id="modal-actions">
      <button id="modal-cancel" class="btn">Cancel</button>
      <button id="modal-create" class="btn btn-primary">Create</button>
    </div>
  </div>
</div>

<!-- ── Toast container ── -->
<div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

<!-- ── Image editor modal ── -->
<div id="img-editor-overlay" class="img-editor-overlay" role="dialog" aria-modal="true" aria-label="Edit image">
  <div class="img-editor-card">
    <h2 class="img-editor-title">Paste Image</h2>

    <div class="img-editor-preview">
      <canvas id="img-editor-canvas"></canvas>
    </div>

    <div class="img-editor-size-row">
      <label for="img-editor-slider">Size</label>
      <input id="img-editor-slider" type="range" min="16" max="640" value="320">
      <span id="img-editor-slider-val">320</span><span class="img-editor-unit"> px</span>
    </div>

    <div class="img-editor-dims">
      <div class="img-editor-dims-line">
        Output <span id="img-editor-output-dims">—</span>
      </div>
      <div class="img-editor-dims-line img-editor-dims-orig">
        Original <span id="img-editor-orig-dims">—</span>
      </div>
    </div>

    <div class="img-editor-field">
      <label for="img-editor-encode">Encode</label>
      <select id="img-editor-encode">
        <option value="auto" selected>Auto</option>
        <option value="png16">PNG 16</option>
        <option value="png256">PNG 256</option>
        <option value="lossless">Lossless</option>
        <option value="webp">WebP</option>
      </select>
    </div>

    <div class="img-editor-est">
      Estimated <span id="img-editor-est-size">—</span>
    </div>

    <div class="img-editor-actions">
      <button id="img-editor-cancel" class="btn">Cancel</button>
      <button id="img-editor-insert" class="btn btn-primary">Insert</button>
    </div>
  </div>
</div>

<!-- ── Context menu (shared, positioned by JS) ── -->
<div id="context-menu" class="item-context-menu" role="menu"></div>

<!-- App entry point (ESM code-split bundle from TypeScript build) -->
<script type="module" src="app.js"></script>

</body>
</html>
