<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A minimal, fast, offline-capable notes app">
  <meta name="theme-color" content="#0a0a0a">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.svg" sizes="any" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Leaf">

  <title>Leaf</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ── Login screen ── -->
<!-- Shown by default; app.js hides it after auth is confirmed -->
<div id="login-screen">
  <div id="login-card">
      <button id="login-close" class="btn-icon" title="Close (Esc)">×</button>

    <div id="login-brand">
      <div class="logo" aria-hidden="true">
        <svg width="16" height="16" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
          <path d="M9 12h6m-6 4h6m2 4H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5l5 5v11a2 2 0 0 1-2 2z"/>
        </svg>
      </div>
      <span>Leaf</span>
    </div>

    <h1 id="login-heading">Sign in</h1>

    <form id="login-form" novalidate>

      <div class="field">
        <label for="login-username">Username</label>
        <input id="login-username" type="text"
               autocomplete="username" autocapitalize="none"
               spellcheck="false" required>
      </div>

      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" type="password"
               autocomplete="current-password" required>
      </div>

      <p id="login-error" role="alert" aria-live="assertive"></p>

      <button id="login-btn" type="submit" class="btn btn-primary btn-full">
        Sign in
      </button>

    </form>

  </div>
</div>

<!-- ── App shell ── -->
<!-- Hidden until auth confirmed -->
<div id="app">

  <!-- ── Header ── -->
  <header id="header">

    <div id="header-brand">
      <button id="btn-toggle-sidebar" class="btn-icon" title="Toggle sidebar"
              aria-label="Toggle sidebar">
        <svg width="14" height="14" fill="none" stroke="currentColor"
             stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 18V6l7 6-7 6z"/>
        </svg>
      </button>
      <button id="btn-menu" class="btn-menu" title="Menu" aria-label="Menu">
        <span class="logo" aria-hidden="true">
          <svg width="13" height="13" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
            <path d="M9 12h6m-6 4h6m2 4H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5l5 5v11a2 2 0 0 1-2 2z"/>
          </svg>
        </span>
        <span class="brand-text">Leaf</span>
      </button>
      <div id="app-menu" class="dropdown-menu">
        <button id="menu-update" class="dropdown-item">Update App</button>
        <button id="menu-reset-db" class="dropdown-item">Reset Database</button>
      </div>
    </div>

    <div id="header-center">
      <span id="current-file">No file selected</span>
      <div id="dirty-dot" title="Unsaved changes"></div>
    </div>

    <div id="header-actions">
      <span id="username-display" class="username-display"></span>
      <button id="btn-signin" class="btn" style="display:none">Sign in</button>
      <button id="btn-save" class="btn btn-primary" disabled title="Save (Ctrl+S)">
        Save
      </button>
      <button id="btn-logout" class="btn" title="Sign out">
        Sign out
      </button>
    </div>

  </header>

  <!-- ── Main ── -->
  <div id="main">

    <!-- Sidebar -->
    <aside id="sidebar" aria-label="Note list">

      <div id="sidebar-toolbar">
        <div id="search-wrap">
          <svg width="13" height="13" fill="none" stroke="currentColor"
               stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search" type="search" placeholder="Filter…"
                 aria-label="Filter notes" autocomplete="off" spellcheck="false">
        </div>
        <button id="btn-new" class="btn" title="New note">
          <svg width="13" height="13" fill="none" stroke="currentColor"
               stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          New
        </button>
      </div>

      <div id="file-list" role="list" aria-label="Notes"></div>

      <!-- Shown only on first visit while initial sync is in progress -->
      <div id="sidebar-loading" aria-live="polite" aria-label="Loading notes">
        <div class="sidebar-spinner" aria-hidden="true"></div>
        <span>Syncing notes…</span>
      </div>

      <div id="sidebar-footer">
        <span id="note-count" aria-live="polite">0 notes</span>
      </div>

    </aside>

    <!-- Editor -->
    <main id="editor-wrap">

      <div id="empty-state" aria-label="No note selected">
        <div class="empty-icon" aria-hidden="true">
          <svg width="22" height="22" fill="none" stroke="currentColor"
               stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M9 12h6m-6 4h6m2 4H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5l5 5v11a2 2 0 0 1-2 2z"/>
          </svg>
        </div>
        <p>Select a note or create a new one</p>
        <small><kbd>Ctrl S</kbd> save</small>
      </div>

      <!-- Tab bar (hidden when no note is open) -->
      <div id="editor-tabs" style="display:none" role="tablist" aria-label="Editor tabs">
        <button id="tab-btn-raw"  class="tab-btn active" role="tab" aria-selected="true">Raw</button>
        <button id="tab-btn-meta" class="tab-btn"        role="tab" aria-selected="false">Meta</button>
      </div>

      <!-- Raw tab — the textarea -->
      <div id="tab-raw" class="tab-panel" role="tabpanel">
        <textarea
          id="note-area"
          spellcheck="true"
          placeholder="Start writing…"
          aria-label="Note content"
        ></textarea>
      </div>

      <!-- Meta tab — structured metadata view -->
      <div id="tab-meta" class="tab-panel" role="tabpanel">
        <div id="meta-panel">
          <!-- Title -->
          <div class="meta-field">
            <label for="meta-title">Title</label>
            <input id="meta-title" type="text" placeholder="Note title" class="meta-input" />
          </div>

          <!-- Summary -->
          <div class="meta-field">
            <label for="meta-summary">Summary</label>
            <textarea id="meta-summary" placeholder="Short description" class="meta-textarea" rows="3"></textarea>
          </div>

          <!-- Tags -->
          <div class="meta-field">
            <label for="meta-tags">Tags</label>
            <input id="meta-tags" type="text" placeholder="tag1, tag2, tag3" class="meta-input" />
          </div>

          <!-- Custom fields -->
          <div id="meta-custom-section">
            <div class="meta-section-header">
              <span>Custom Fields</span>
              <button id="btn-add-custom" class="btn-small">+ Add</button>
            </div>
            <div id="meta-custom-rows"></div>
          </div>

          <!-- Content stats (body only) -->
          <div id="meta-stats-section">
            <div class="meta-section-header">Size (body only)</div>
            <div id="meta-stats" class="meta-stats"></div>
          </div>

          <!-- System info -->
          <div id="meta-system-section">
            <div class="meta-section-header">System Info</div>
            <table id="meta-system-table" class="meta-system-table">
              <tr><td>Version</td><td id="meta-sys-current"></td></tr>
              <tr><td>Created</td><td id="meta-sys-created"></td></tr>
              <tr><td>Updated</td><td id="meta-sys-updated"></td></tr>
              <tr><td>Created by</td><td id="meta-sys-created-by"></td></tr>
              <tr><td>Updated by</td><td id="meta-sys-updated-by"></td></tr>
            </table>
          </div>
        </div>
      </div>

    </main>

  </div>

  <!-- ── Status bar ── -->
  <div id="statusbar" role="status" aria-live="polite">
    <span id="status-msg"></span>
    <span id="offline-badge" class="status-item">offline</span>
    <span id="sync-status"   class="status-item"></span>
  </div>

</div>

<!-- ── New note modal ── -->
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="modal">
    <h2 id="modal-title">New note</h2>
    <div class="modal-field">
      <label for="modal-input">Name</label>
      <input id="modal-input" type="text" placeholder="my-note"
             maxlength="80" autocomplete="off" spellcheck="false">
    </div>
    <p id="modal-hint" class="modal-hint"></p>
    <div id="modal-actions">
      <button id="modal-cancel" class="btn">Cancel</button>
      <button id="modal-create" class="btn btn-primary">Create</button>
    </div>
  </div>
</div>

<!-- ── Toast container ── -->
<div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

<!-- ── Context menu (shared, positioned by JS) ── -->
<div id="item-context-menu" class="item-context-menu" role="menu">
  <button class="context-menu-item" data-action="rename">Rename</button>
  <button class="context-menu-item danger" data-action="delete">Delete</button>
</div>

<!-- App entry point (single bundle from TypeScript build) -->
<script src="app.js"></script>

</body>
</html>
